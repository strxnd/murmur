name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Install mise toolchain
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag
        run: |
          tag="${GITHUB_REF_NAME}"
          package_version="$(node -p "require('./apps/desktop/package.json').version")"
          semver_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "::error title=Invalid release tag::Release tags must be SemVer, for example ${package_version}."
            exit 1
          fi

          if [ "$package_version" != "$tag" ]; then
            echo "::error title=Version mismatch::Tag ${tag} does not match apps/desktop/package.json version ${package_version}."
            exit 1
          fi

          notes_file="docs/releases/${tag}.md"
          if [ ! -s "$notes_file" ]; then
            echo "::error title=Missing release notes::Create ${notes_file} with meaningful release notes before pushing ${tag}."
            exit 1
          fi

      - name: Typecheck
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Audit dependencies
        run: bun audit --audit-level=moderate

      - name: Check runtime release URLs
        run: bun run runtimes:manifest-check:release

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-24.04
            artifact: linux-artifacts
          - name: macos-x64
            runner: macos-15-intel
            artifact: macos-x64-artifacts
          - name: macos-arm64
            runner: macos-15
            artifact: macos-arm64-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential cmake rpm

      - name: Install mise toolchain
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare STT runtimes
        run: |
          bun run runtimes:prepare
          bun run runtimes:doctor

      - name: Build release artifacts
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.MACOS_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: bun run dist:release

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.dmg
            dist/*.zip
            dist/latest-*.yml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: "*-artifacts"
          path: dist
          merge-multiple: true

      - name: Generate and verify checksums
        run: |
          node scripts/generate-linux-release-checksums.mjs
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}.md"
          artifacts_file="$(mktemp)"
          trap 'rm -f "$artifacts_file"' EXIT
          node scripts/list-release-artifacts.mjs dist > "$artifacts_file"
          mapfile -d '' artifacts < "$artifacts_file"

          gh release create "$tag" "${artifacts[@]}" \
            --draft \
            --title "Murmur ${tag}" \
            --notes-file "$notes_file"
