name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: |
          tag="${GITHUB_REF_NAME}"
          package_version="$(node -p "require('./apps/desktop/package.json').version")"
          semver_re='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'

          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "::error title=Invalid release tag::Release tags must be SemVer, for example ${package_version}."
            exit 1
          fi

          if [ "$package_version" != "$tag" ]; then
            echo "::error title=Version mismatch::Tag ${tag} does not match apps/desktop/package.json version ${package_version}."
            exit 1
          fi

          notes_file="docs/releases/${tag}.md"
          if [ ! -s "$notes_file" ]; then
            echo "::error title=Missing release notes::Create ${notes_file} with meaningful release notes before pushing ${tag}."
            exit 1
          fi

      - name: Typecheck
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Check runtime release URLs
        run: mise run runtimes:manifest-check:release

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-24.04
            artifact: linux-artifacts
          - name: macos-x64
            runner: macos-15-intel
            artifact: macos-x64-artifacts
          - name: macos-arm64
            runner: macos-15
            artifact: macos-arm64-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential cmake rpm

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Prepare STT runtimes
        run: |
          mise run runtimes:prepare
          mise run runtimes:doctor

      - name: Build artifacts
        run: mise run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.dmg
            dist/*.zip
            dist/latest-*.yml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-artifacts"
          path: dist
          merge-multiple: true

      - name: Generate and verify checksums
        run: |
          node scripts/generate-linux-release-checksums.mjs
          (cd dist && sha256sum -c SHA256SUMS.txt)

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}.md"
          artifacts=(
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.dmg
            dist/*.zip
            dist/latest-*.yml
            dist/SHA256SUMS.txt
          )

          gh release create "$tag" "${artifacts[@]}" \
            --draft \
            --title "Murmur ${tag}" \
            --notes-file "$notes_file"
