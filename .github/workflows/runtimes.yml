name: Runtime Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "scripts/prepare-runtimes.mjs"
      - "scripts/check-runtimes.mjs"
      - "scripts/package-runtimes.mjs"
      - "scripts/check-runtime-manifest.mjs"
      - "scripts/runtime-manifest.json"
      - "src/shared/stt-runtime-catalog.ts"
      - "patches/whisper.cpp/**"
      - ".github/workflows/runtimes.yml"
  pull_request:
    paths:
      - "scripts/prepare-runtimes.mjs"
      - "scripts/check-runtimes.mjs"
      - "scripts/package-runtimes.mjs"
      - "scripts/check-runtime-manifest.mjs"
      - "scripts/runtime-manifest.json"
      - "src/shared/stt-runtime-catalog.ts"
      - "patches/whisper.cpp/**"
      - ".github/workflows/runtimes.yml"

jobs:
  runtimes:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-13
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: node scripts/prepare-runtimes.mjs --platform current

      - run: node scripts/check-runtimes.mjs

      - run: node scripts/package-runtimes.mjs --platform current

      - uses: actions/upload-artifact@v4
        with:
          name: stt-runtime-archives-${{ matrix.platform }}
          path: dist/runtimes/*.tar.gz
          if-no-files-found: error

      - name: Attach archives to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes ""
          gh release upload "${GITHUB_REF_NAME}" dist/runtimes/*.tar.gz --clobber
