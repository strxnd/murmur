name: Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise toolchain
        uses: jdx/mise-action@v4.2.0
        with:
          version: 2026.6.11
          install: true
          cache: true

      - name: Install dependencies
        run: mise run install

      - name: Typecheck
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build

      - name: Check runtime manifest
        run: mise run runtimes:manifest-check
