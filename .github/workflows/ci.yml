name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build

      - name: Check runtime manifest
        run: mise run runtimes:manifest-check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=moderate
