name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check runtime manifest
        run: bun run runtimes:manifest-check

      - name: Check runtime release URLs
        run: bun run runtimes:manifest-check:release

      - name: Audit dependencies
        run: bun audit --audit-level=moderate

  macos-helper:
    name: Compile macOS helper (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-15-intel, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Compile helper
        run: bun run macos-helper:build
