name: Runtime Assets

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Runtime platform key or current"
        required: true
        default: current
      accelerator:
        description: "cpu, cuda, apple, or all"
        required: true
        default: all

permissions:
  contents: read

jobs:
  package-runtime-assets:
    name: Package runtime assets
    runs-on: ${{ startsWith(inputs.platform, 'darwin') && (inputs.platform == 'darwin-x64' && 'macos-15-intel' || 'macos-15') || 'ubuntu-24.04' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential cmake

      - name: Install mise toolchain
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare runtimes
        env:
          RUNTIME_PLATFORM: ${{ inputs.platform }}
          RUNTIME_ACCELERATOR: ${{ inputs.accelerator }}
        run: bun run runtimes:prepare -- --platform "$RUNTIME_PLATFORM" --accelerator "$RUNTIME_ACCELERATOR"

      - name: Package runtimes
        env:
          RUNTIME_PLATFORM: ${{ inputs.platform }}
          RUNTIME_ACCELERATOR: ${{ inputs.accelerator }}
        run: bun run runtimes:package -- --platform "$RUNTIME_PLATFORM" --accelerator "$RUNTIME_ACCELERATOR"

      - name: Check runtime manifest
        run: bun run runtimes:manifest-check

      - name: Upload runtime archives
        uses: actions/upload-artifact@v4
        with:
          name: runtime-assets-${{ inputs.platform }}-${{ inputs.accelerator }}
          path: dist/runtimes/*.tar.gz
