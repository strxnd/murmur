[tools]
node = "25.9.0"

[tasks.install]
description = "Install dependencies from package-lock.json."
run = "npm ci"

[tasks.dev]
description = "Start the Electron/Vite development app."
run = "npm run dev"

[tasks.build]
description = "Typecheck and build production output."
run = "npm run build"

[tasks.clean]
description = "Remove generated build and packaging output."
run = "npm run clean"

[tasks."clean:all"]
description = "Remove generated output and prepared local runtime artifacts."
run = "npm run clean:all"

[tasks.preview]
description = "Preview the built Electron app."
run = "npm run preview"

[tasks.lint]
description = "Run TypeScript type checking."
run = "npm run lint"

[tasks.test]
description = "Run the Vitest test suite."
run = "npm run test"

[tasks."runtimes:prepare"]
description = "Prepare current-platform local STT runtime binaries."
run = "npm run runtimes:prepare"

[tasks."runtimes:package"]
description = "Package current-platform local STT runtime binaries."
run = "npm run runtimes:package"

[tasks."runtimes:stage"]
description = "Stage prepared current-platform STT runtimes for app packaging."
run = "npm run runtimes:stage"

[tasks."runtimes:doctor"]
description = "Check current-platform local STT runtime readiness."
run = "npm run runtimes:doctor"

[tasks."runtimes:manifest-check"]
description = "Validate pinned STT runtime archive metadata."
run = "npm run runtimes:manifest-check"

[tasks."runtimes:manifest-check:release"]
description = "Validate configured STT runtime release URLs are reachable."
run = "npm run runtimes:manifest-check:release"

[tasks."linux-helper:build"]
description = "Build the optional native Linux keyboard helper."
run = "npm run linux-helper:build"

[tasks."release:prepare"]
description = "Prepare local release artifacts without committing, tagging, pushing, or creating releases."
run = "npm run release:prepare --"

[tasks.pack]
description = "Build and package an unpacked Electron app."
run = "npm run pack"

[tasks.dist]
description = "Build distributable Electron artifacts."
run = "npm run dist"
